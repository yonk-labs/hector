# Hector — TDD planner with LLM-backed test writing
# Frontier model writes the spec → hector writes the test → bob implements

models:
  - { name: gemma, model: "cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit", base_url: "http://192.168.1.133:8000/v1" }
  - { name: qwen, model: "Intel/Qwen3-Coder-Next-int4-AutoRound", base_url: "http://192.168.1.193:8000/v1" }
  - { name: minimax, model: "MiniMax-M3", base_url: "https://api.minimax.io/v1", api_key_env: MINIMAX_API_KEY }
default_model: gemma

verify:
  prefer_focused: true
scope:
  forbid_dependency_churn: true
  default_max_changed_files: 2
  default_max_changed_lines: 160
judge:
  default_policy: retry_on_fail
bob:
  campaign_auto_commit: true

# Tier-2 deep review: frontier reviewer runs ONCE per slice before handing
# to the frontier model. Cheap per-iteration review (bob's judge) already
# caught obvious bugs; this is the final quality gate.
review:
  deep_reviewer: codex
  deep_on_accept: false
